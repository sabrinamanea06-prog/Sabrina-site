<script>
  const text = "Hi, I'm Sabrina.\nI compete, sell homes,\nand build things online.";
  const speed = 55;
  let i = 0;

  function typeWriter() {
    if (i < text.length) {
      document.getElementById("typewriter").innerHTML +=
        text.charAt(i) === "\n" ? "<br>" : text.charAt(i);
      i++;
      setTimeout(typeWriter, speed);
    }
  }

  typeWriter();
</script>
